<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheorieTest — Führerschein Österreich</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

:root[data-theme="light"] {
  --bg: #0e0f14;
  --surface: #161820;
  --border: #252733;
  --text: #e8e9f0;
  --muted: #7b7d8e;
  --accent: #f0c040;
  --card-bg: #1c1e28;
  --shadow: rgba(0,0,0,0.4);
}
:root[data-theme="light"] {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --border: #e2e4ea;
  --text: #1a1b23;
  --muted: #8b8fa8;
  --accent: #d4a800;
  --card-bg: #ffffff;
  --shadow: rgba(0,0,0,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, color 0.3s;
}

/* ── THEME TOGGLE ── */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  transition: all 0.2s;
  z-index: 1000;
  box-shadow: 0 2px 12px var(--shadow);
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
.theme-icon { font-size: 16px; }

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 40px 24px;
  max-width: 600px;
  width: 100%;
}

.flag {
  font-size: 48px;
  margin-bottom: 20px;
  display: block;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

h1 {
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 12px;
}
h1 span { color: var(--accent); }

.subtitle {
  font-size: 15px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  margin-bottom: 48px;
  line-height: 1.6;
}

/* ── LANGUAGE CARDS ── */
.lang-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  width: 100%;
  margin-bottom: 40px;
}

.lang-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 20px;
  cursor: pointer;
  transition: all 0.25s;
  text-decoration: none;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px var(--shadow);
}
.lang-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(240,192,64,0.05));
  opacity: 0;
  transition: opacity 0.25s;
}
.lang-card:hover::before { opacity: 1; }
.lang-card:hover {
  border-color: var(--accent);
  transform: translateY(-4px);
  box-shadow: 0 12px 32px var(--shadow);
}
.lang-card.disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.lang-card.disabled:hover {
  transform: none;
  border-color: var(--border);
  box-shadow: 0 4px 20px var(--shadow);
}
.lang-flag { font-size: 36px; }
.lang-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.lang-native {
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
}
.lang-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(240,192,64,0.15);
  color: var(--accent);
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid rgba(240,192,64,0.3);
}
.lang-badge.soon {
  background: rgba(123,125,142,0.15);
  color: var(--muted);
  border-color: rgba(123,125,142,0.3);
}

/* ── STATS ── */
.stats {
  display: flex;
  gap: 24px;
  justify-content: center;
  flex-wrap: wrap;
}
.stat {
  text-align: center;
  font-family: 'DM Mono', monospace;
}
.stat-val {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
  display: block;
}
.stat-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.stat-sep {
  width: 1px;
  background: var(--border);
  align-self: stretch;
}

/* ── FOOTER ── */
.page-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
}
.page-footer a {
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.page-footer a:hover { color: var(--accent); }

@media (max-width: 500px) {
  .lang-grid { grid-template-columns: 1fr; max-width: 260px; margin: 0 auto 40px; }
  .stats { gap: 16px; }
  .stat-sep { display: none; }
}
</style>
</head>

</div>
