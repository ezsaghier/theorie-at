<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheorieTest — English</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap");

      :root[data-theme="light"] {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --surface2: #f0f1f5;
        --border: #e2e4ea;
        --accent: #d4a800;
        --accent2: #3b6de0;
        --accent4: #2aada5;
        --text: #1a1b23;
        --muted: #8b8fa8;
        --easy: #2aada5;
        --medium: #d4a800;
        --hard: #e05555;
        --main-q: #3b6de0;
        --supp-q: #e07830;
      }
      :root[data-theme="dark"] {
        --bg: #0e0f14;
        --surface: #161820;
        --surface2: #1c1e28;
        --border: #252733;
        --accent: #f0c040;
        --accent2: #5b8cff;
        --accent4: #4ecdc4;
        --text: #e8e9f0;
        --muted: #7b7d8e;
        --easy: #4ecdc4;
        --medium: #f0c040;
        --hard: #ff6b6b;
        --main-q: #5b8cff;
        --supp-q: #fb923c;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        min-height: 100vh;
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* TOPBAR */
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        gap: 12px;
      }
      .logo {
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.5px;
        text-decoration: none;
        color: var(--text);
        white-space: nowrap;
      }
      .logo span {
        color: var(--accent);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .progress-text {
        font-size: 11px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        white-space: nowrap;
      }
      .progress-text span {
        color: var(--accent);
        font-weight: 500;
      }
      .icon-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 50px;
        padding: 5px 11px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        transition: all 0.2s;
        text-decoration: none;
        white-space: nowrap;
      }
      .icon-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* LAYOUT */
      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: calc(100vh - 52px);
      }

      /* SIDEBAR */
      .sidebar {
        background: var(--surface);
        border-right: 1px solid var(--border);
        height: calc(100vh - 52px);
        position: sticky;
        top: 52px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
        display: flex;
        flex-direction: column;
      }

      /* FILTER SECTION */
      .filter-section {
        padding: 14px;
        border-bottom: 1px solid var(--border);
      }
      .filter-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        margin-bottom: 12px;
      }
      .filter-group {
        margin-bottom: 10px;
      }
      .filter-group-label {
        font-size: 10px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .chips {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }

      /* CHIP STATES */
      .chip {
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 11px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        background: var(--bg);
        user-select: none;
      }
      /* ALL chip active */
      .chip.all-on {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(240, 192, 64, 0.1);
      }
      /* individual chip active */
      .chip.on {
        font-weight: 600;
      }
      .chip.on-Easy {
        border-color: var(--easy);
        color: var(--easy);
        background: rgba(78, 205, 196, 0.1);
      }
      .chip.on-Medium {
        border-color: var(--medium);
        color: var(--medium);
        background: rgba(240, 192, 64, 0.1);
      }
      .chip.on-Hard {
        border-color: var(--hard);
        color: var(--hard);
        background: rgba(255, 107, 107, 0.1);
      }
      .chip.on-main {
        border-color: var(--main-q);
        color: var(--main-q);
        background: rgba(91, 140, 255, 0.1);
      }
      .chip.on-supplementary {
        border-color: var(--supp-q);
        color: var(--supp-q);
        background: rgba(251, 146, 60, 0.1);
      }
      /* dim when not selected */
      .chip.dim {
        opacity: 0.35;
      }

      .reset-btn {
        width: 100%;
        background: transparent;
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 6px;
        font-size: 11px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 4px;
      }
      .reset-btn:hover {
        border-color: var(--hard);
        color: var(--hard);
      }

      /* SEARCH + TOPICS */
      .sidebar-search {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }
      .search-input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 12px;
        color: var(--text);
        font-size: 12px;
        font-family: "DM Mono", monospace;
        outline: none;
        transition: border-color 0.2s;
      }
      .search-input:focus {
        border-color: var(--accent);
      }
      .search-input::placeholder {
        color: var(--muted);
      }
      .topic-list {
        flex: 1;
        overflow-y: auto;
      }
      .module-header {
        padding: 8px 14px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        background: rgba(128, 128, 128, 0.04);
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 5;
      }
      .module-cnt {
        color: var(--accent);
      }
      .topic-item {
        padding: 8px 14px;
        cursor: pointer;
        transition: background 0.15s;
        border-bottom: 1px solid rgba(128, 128, 128, 0.06);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
      }
      .topic-item:hover {
        background: rgba(128, 128, 128, 0.05);
      }
      .topic-item.active {
        background: rgba(240, 192, 64, 0.07);
        border-left: 2px solid var(--accent);
      }
      .topic-item.active .topic-name {
        color: var(--accent);
      }
      .topic-name {
        font-size: 12px;
        line-height: 1.4;
        flex: 1;
      }
      .topic-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 3px;
        flex-shrink: 0;
      }
      .topic-count {
        font-size: 12px;
        font-family: "DM Mono", monospace;
        color: var(--accent);
        font-weight: 700;
      }
      .topic-mini {
        display: flex;
        gap: 3px;
      }
      .tm {
        font-size: 9px;
        font-family: "DM Mono", monospace;
        padding: 1px 5px;
        border-radius: 8px;
      }
      .tm-e {
        background: rgba(78, 205, 196, 0.12);
        color: var(--easy);
      }
      .tm-m {
        background: rgba(240, 192, 64, 0.12);
        color: var(--medium);
      }
      .tm-h {
        background: rgba(255, 107, 107, 0.12);
        color: var(--hard);
      }

      /* MAIN */
      .main-wrap {
        display: flex;
        flex-direction: column;
      }
      .main {
        padding: 16px 20px;
        flex: 1;
        max-width: 740px;
      }
      .results-info {
        font-size: 12px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .results-count {
        color: var(--accent);
        font-weight: 700;
      }
      .filter-tag {
        font-size: 10px;
        font-family: "DM Mono", monospace;
        padding: 2px 8px;
        border-radius: 10px;
        background: rgba(240, 192, 64, 0.1);
        color: var(--accent);
        border: 1px solid rgba(240, 192, 64, 0.2);
      }

      /* QUESTION CARD */
      .q-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 12px;
        overflow: hidden;
        animation: fadeIn 0.25s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .q-header {
        padding: 10px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 6px;
      }
      .q-id {
        font-size: 11px;
        font-family: "DM Mono", monospace;
        color: var(--accent);
        font-weight: 600;
      }
      .q-meta {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        align-items: center;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 10px;
        font-family: "DM Mono", monospace;
        font-weight: 600;
      }
      .pill-Easy {
        background: rgba(78, 205, 196, 0.12);
        color: var(--easy);
      }
      .pill-Medium {
        background: rgba(240, 192, 64, 0.12);
        color: var(--medium);
      }
      .pill-Hard {
        background: rgba(255, 107, 107, 0.12);
        color: var(--hard);
      }
      .pill-main {
        background: rgba(91, 140, 255, 0.12);
        color: var(--main-q);
      }
      .pill-supplementary {
        background: rgba(251, 146, 60, 0.12);
        color: var(--supp-q);
      }

      /* LINKED QUESTION TOGGLE BTN */
      .linked-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 10px;
        font-family: "DM Mono", monospace;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid;
        background: transparent;
      }
      .linked-btn-sub {
        border-color: var(--supp-q);
        color: var(--supp-q);
      }
      .linked-btn-sub:hover {
        background: rgba(251, 146, 60, 0.1);
      }
      .linked-btn-main {
        border-color: var(--main-q);
        color: var(--main-q);
      }
      .linked-btn-main:hover {
        background: rgba(91, 140, 255, 0.1);
      }

      /* SLIDE PANEL */
      .linked-panel {
        overflow: hidden;
        max-height: 0;
        transition:
          max-height 0.4s ease,
          opacity 0.3s ease;
        opacity: 0;
      }
      .linked-panel.open {
        max-height: 600px;
        opacity: 1;
      }
      .linked-inner {
        border-top: 1px dashed var(--border);
        padding: 14px;
        background: var(--surface2);
      }
      .linked-label {
        font-size: 10px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .linked-label span {
        font-size: 14px;
      }

      /* QUESTION BODY */
      .q-body {
        padding: 14px;
      }
      .q-image {
        margin-bottom: 12px;
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        max-height: 240px;
      }
      .q-image img {
        max-width: 100%;
        max-height: 240px;
        object-fit: contain;
        display: block;
      }
      .q-image.hidden {
        display: none;
      }
      .q-text {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .answers {
        display: grid;
        gap: 6px;
      }
      .answer {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 11px;
        border-radius: 7px;
        background: var(--surface2);
        border: 1px solid transparent;
        font-size: 13px;
        line-height: 1.4;
      }
      .answer.correct {
        background: rgba(78, 205, 196, 0.07);
        border-color: rgba(78, 205, 196, 0.25);
        color: var(--easy);
      }
      .linked-inner .answer {
        background: var(--surface);
      }
      .answer-marker {
        width: 19px;
        height: 19px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-family: "DM Mono", monospace;
        font-weight: 700;
        flex-shrink: 0;
        background: var(--border);
        color: var(--muted);
      }
      .answer.correct .answer-marker {
        background: var(--easy);
        color: #fff;
      }

      /* LOAD MORE */
      .load-more-wrap {
        text-align: center;
        padding: 20px 0;
      }
      .load-more-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 26px;
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .load-more-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 13px;
        line-height: 2;
      }

      /* FOOTER */
      .site-footer {
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 11px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
      }
      .site-footer a {
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
      }
      .site-footer a:hover {
        color: var(--accent);
      }

      @media (max-width: 700px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
        .main {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <a class="logo" href="index.html">Theorie<span>Test</span>.at</a>
      <div class="topbar-right">
        <div class="progress-text">
          Showing <span id="showingCount">0</span> of
          <span id="totalCount">0</span>
        </div>
        <a class="icon-btn" href="index.html">🌐 EN</a>
        <button class="icon-btn" onclick="toggleTheme()">
          <span id="themeIcon">🌙</span> <span id="themeLabel">Dark</span>
        </button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <div class="filter-section">
          <div class="filter-title">Filters</div>

          <div class="filter-group">
            <div class="filter-group-label">Difficulty</div>
            <div class="chips" id="diffChips">
              <div
                class="chip all-on"
                data-g="diff"
                data-v="ALL"
                onclick="clickChip(this)"
              >
                All
              </div>
              <div
                class="chip all-on"
                data-g="diff"
                data-v="Easy"
                onclick="clickChip(this)"
              >
                Easy
              </div>
              <div
                class="chip all-on"
                data-g="diff"
                data-v="Medium"
                onclick="clickChip(this)"
              >
                Medium
              </div>
              <div
                class="chip all-on"
                data-g="diff"
                data-v="Hard"
                onclick="clickChip(this)"
              >
                Hard
              </div>
            </div>
          </div>

          <div class="filter-group">
            <div class="filter-group-label">Type</div>
            <div class="chips" id="typeChips">
              <div
                class="chip all-on"
                data-g="type"
                data-v="ALL"
                onclick="clickChip(this)"
              >
                All
              </div>
              <div
                class="chip all-on"
                data-g="type"
                data-v="main"
                onclick="clickChip(this)"
              >
                Main
              </div>
              <div
                class="chip all-on"
                data-g="type"
                data-v="supplementary"
                onclick="clickChip(this)"
              >
                Supplementary
              </div>
            </div>
          </div>

          <button class="reset-btn" onclick="resetFilters()">
            ↺ Reset all filters
          </button>
        </div>

        <div class="sidebar-search">
          <input
            class="search-input"
            type="text"
            placeholder="Search topic..."
            id="topicSearch"
            oninput="filterTopics()"
          />
        </div>
        <div class="topic-list" id="topicList"></div>
      </div>

      <div class="main-wrap">
        <div class="main">
          <div class="results-info">
            Showing
            <span class="results-count" id="resultCount">0</span> questions
            <span id="filterTags"></span>
          </div>
          <div id="questionList"></div>
          <div class="load-more-wrap" id="loadMoreWrap" style="display: none">
            <button class="load-more-btn" onclick="loadMore()">
              Load more ↓
            </button>
          </div>
          <div class="empty" id="emptyState" style="display: none">
            No questions match your filters.<br />Try adjusting the filters on
            the left.
          </div>
        </div>
        <footer class="site-footer">
          <span>© 2026 Ezzedeen Saghier</span>
          <div style="display: flex; gap: 16px">
            <a href="impressum.html">Impressum</a>
            <a href="datenschutz.html">Datenschutz</a>
            <a href="mailto:ezsaghier@gmail.com">Kontakt</a>
          </div>
        </footer>
      </div>
    </div>

    <script>
      let ALL = [],
        filtered = [],
        activeTopic = "all",
        shown = 0;
      const PER = 20,
        MARKERS = ["A", "B", "C", "D"];
      let BY_ID = {};

      // فلاتر: null = ALL، string = قيمة محددة
      const F = { diff: null, type: null };

      // ── CHIP LOGIC ──
      function clickChip(chip) {
        const g = chip.dataset.g,
          v = chip.dataset.v;
        if (v === "ALL") {
          F[g] = null;
        } else {
          F[g] = F[g] === v ? null : v; // toggle
        }
        renderChips(g);
        applyFilters();
      }

      function renderChips(g) {
        const chips = document.querySelectorAll(`[data-g="${g}"]`);
        const val = F[g];
        chips.forEach((c) => {
          const cv = c.dataset.v;
          c.className = "chip";
          if (val === null) {
            // ALL mode — كل الـ chips ملونة
            c.classList.add("all-on");
          } else {
            if (cv === "ALL") {
              c.classList.add("dim");
            } else if (cv === val) {
              c.classList.add(`on-${cv}`);
            } else {
              c.classList.add("dim");
            }
          }
        });
      }

      function resetFilters() {
        F.diff = null;
        F.type = null;
        renderChips("diff");
        renderChips("type");
        applyFilters();
      }

      // ── TOPIC LIST ──
      function encId(t) {
        return t.replace(/[\s,\/\-äöüÄÖÜß]/g, "_");
      }

      function buildTopicList() {
        const modules = {};
        ALL.forEach((q) => {
          if (!modules[q.module]) modules[q.module] = {};
          if (!modules[q.module][q.topic])
            modules[q.module][q.topic] = { Easy: 0, Medium: 0, Hard: 0 };
          modules[q.module][q.topic][q.difficulty]++;
        });
        const container = document.getElementById("topicList");
        container.innerHTML = "";
        const allItem = document.createElement("div");
        allItem.className = "topic-item active";
        allItem.dataset.topic = "all";
        allItem.innerHTML = `<span class="topic-name" style="font-weight:700">All Questions</span><div class="topic-right"><span class="topic-count" id="cnt-all">${ALL.length}</span></div>`;
        allItem.onclick = () => selectTopic("all", allItem);
        container.appendChild(allItem);
        for (const [mod, topics] of Object.entries(modules)) {
          const modDiv = document.createElement("div");
          const mid = encId(mod);
          modDiv.innerHTML = `<div class="module-header"><span>${mod}</span><span class="module-cnt" id="mod-${mid}">0</span></div>`;
          for (const [topic, stats] of Object.entries(topics)) {
            const item = document.createElement("div");
            item.className = "topic-item";
            item.dataset.topic = topic;
            item.dataset.name = topic.toLowerCase();
            const tid = encId(topic);
            item.innerHTML = `
        <span class="topic-name">${topic}</span>
        <div class="topic-right">
          <span class="topic-count" id="cnt-${tid}">0</span>
          <div class="topic-mini">
            <span class="tm tm-e" id="e-${tid}">E:${stats.Easy}</span>
            <span class="tm tm-m" id="m-${tid}">M:${stats.Medium}</span>
            <span class="tm tm-h" id="h-${tid}">H:${stats.Hard}</span>
          </div>
        </div>`;
            item.onclick = () => selectTopic(topic, item);
            modDiv.appendChild(item);
          }
          container.appendChild(modDiv);
        }
      }

      function updateCounts() {
        const tc = {},
          mc = {};
        ALL.forEach((q) => {
          if (!passFilter(q)) return;
          tc[q.topic] = (tc[q.topic] || 0) + 1;
          mc[q.module] = (mc[q.module] || 0) + 1;
        });
        const allEl = document.getElementById("cnt-all");
        if (allEl)
          allEl.textContent = Object.values(tc).reduce((a, b) => a + b, 0);
        document.querySelectorAll(".topic-item[data-topic]").forEach((item) => {
          const topic = item.dataset.topic;
          if (topic === "all") return;
          const el = document.getElementById(`cnt-${encId(topic)}`);
          if (el) el.textContent = tc[topic] || 0;
        });
        for (const [mod] of Object.entries(mc)) {
          const el = document.getElementById(`mod-${encId(mod)}`);
          if (el) el.textContent = mc[mod] || 0;
        }
        document.querySelectorAll('[id^="mod-"]').forEach((el) => {
          const mod = el.id.replace("mod-", "").replace(/_/g, " ");
          if (!mc[mod]) el.textContent = "0";
        });
      }

      function filterTopics() {
        const s = document.getElementById("topicSearch").value.toLowerCase();
        document.querySelectorAll(".topic-item[data-name]").forEach((i) => {
          i.style.display = i.dataset.name.includes(s) ? "" : "none";
        });
      }

      function selectTopic(topic, el) {
        document
          .querySelectorAll(".topic-item")
          .forEach((i) => i.classList.remove("active"));
        el.classList.add("active");
        activeTopic = topic;
        applyFilters();
      }

      // ── FILTER LOGIC ──
      function passFilter(q) {
        const dOk = F.diff === null || q.difficulty === F.diff;
        const tOk = F.type === null || q.type === F.type;
        return dOk && tOk;
      }

      function applyFilters() {
        filtered = ALL.filter((q) => {
          const topicOk = activeTopic === "all" || q.topic === activeTopic;
          return topicOk && passFilter(q);
        });
        shown = 0;
        document.getElementById("resultCount").textContent = filtered.length;
        document.getElementById("questionList").innerHTML = "";
        document.getElementById("emptyState").style.display =
          filtered.length === 0 ? "block" : "none";
        document.getElementById("loadMoreWrap").style.display = "none";
        updateCounts();
        updateFilterTags();
        loadMore();
      }

      function updateFilterTags() {
        const tags = [];
        if (F.diff) tags.push(`<span class="filter-tag">${F.diff}</span>`);
        if (F.type)
          tags.push(
            `<span class="filter-tag">${F.type === "main" ? "Main" : "Supplementary"}</span>`,
          );
        if (activeTopic !== "all")
          tags.push(`<span class="filter-tag">📍 ${activeTopic}</span>`);
        document.getElementById("filterTags").innerHTML = tags.join("");
      }

      // ── LINKED QUESTION PANEL ──
      function toggleLinked(cardId) {
        const panel = document.getElementById(`linked-${cardId}`);
        if (!panel) return;
        panel.classList.toggle("open");
        const btn = document.getElementById(`linked-btn-${cardId}`);
        if (btn) {
          const isOpen = panel.classList.contains("open");
          const q = BY_ID[cardId];
          if (q.type === "main") {
            btn.innerHTML = isOpen
              ? "▲ Hide Supplementary"
              : "▼ Show Supplementary";
          } else {
            btn.innerHTML = isOpen
              ? "▲ Hide Main Question"
              : "▲ Show Main Question";
          }
        }
      }

      function buildQuestionBody(q, isLinked = false) {
        const isGif = q.image && q.image >= 100000;
        const imgUrl = q.image
          ? `https://img.f-online.at/${q.image}.${isGif ? "gif" : "jpg"}`
          : null;
        const suffix = isLinked ? `-linked` : "-main";
        const imgHtml = imgUrl
          ? `<div class="q-image" id="img-${q.id}${suffix}"><img src="${imgUrl}" onerror="document.getElementById('img-${q.id}${suffix}').classList.add('hidden')" alt="Q${q.id}"></div>`
          : "";
        const answers = q.answers
          .map(
            (a, i) =>
              `<div class="answer ${a.correct ? "correct" : ""}"><div class="answer-marker">${MARKERS[i]}</div><div>${a.text}</div></div>`,
          )
          .join("");
        return `${imgHtml}<div class="q-text">${q.text}</div><div class="answers">${answers}</div>`;
      }

      function buildCard(q) {
        // هل يوجد سؤال مرتبط؟
        let linkedHtml = "";
        let linkedBtnHtml = "";

        if (q.type === "main") {
          const subQ = BY_ID[q.sub_id];
          if (subQ) {
            linkedBtnHtml = `<button class="linked-btn linked-btn-sub" id="linked-btn-${q.id}" onclick="toggleLinked(${q.id})">▼ Show Supplementary</button>`;
            linkedHtml = `<div class="linked-panel" id="linked-${q.id}">
        <div class="linked-inner">
          <div class="linked-label"><span>↓</span> Supplementary Question #${subQ.id} · <span class="pill pill-${subQ.difficulty}">${subQ.difficulty}</span></div>
          ${buildQuestionBody(subQ, true)}
        </div>
      </div>`;
          }
        } else if (q.type === "supplementary") {
          const mainQ = BY_ID[q.parent_id];
          if (mainQ) {
            linkedBtnHtml = `<button class="linked-btn linked-btn-main" id="linked-btn-${q.id}" onclick="toggleLinked(${q.id})">▲ Show Main Question</button>`;
            linkedHtml = `<div class="linked-panel" id="linked-${q.id}">
        <div class="linked-inner">
          <div class="linked-label"><span>↑</span> Main Question #${mainQ.id} · <span class="pill pill-${mainQ.difficulty}">${mainQ.difficulty}</span></div>
          ${buildQuestionBody(mainQ, true)}
        </div>
      </div>`;
          }
        }

        return `<div class="q-card">
    <div class="q-header">
      <span class="q-id">Question #${q.id}</span>
      <div class="q-meta">
        <span class="pill pill-${q.difficulty}">${q.difficulty}</span>
        <span class="pill pill-${q.type}">${q.type === "main" ? "Main" : "Supplementary"}</span>
        ${linkedBtnHtml}
      </div>
    </div>
    <div class="q-body">${buildQuestionBody(q)}</div>
    ${linkedHtml}
  </div>`;
      }

      function loadMore() {
        if (filtered.length === 0) return;
        const batch = filtered.slice(shown, shown + PER);
        const container = document.getElementById("questionList");
        batch.forEach((q) => {
          container.innerHTML += buildCard(q);
        });
        shown += batch.length;
        document.getElementById("showingCount").textContent = shown;
        document.getElementById("totalCount").textContent = filtered.length;
        document.getElementById("loadMoreWrap").style.display =
          shown < filtered.length ? "block" : "none";
      }

      // ── INIT ──
      async function init() {
        try {
          const res = await fetch("fahrschule_full.json");
          const raw = await res.json();
          ALL = raw;

          // بناء خريطة ID
          ALL.forEach((q) => {
            BY_ID[q.id] = q;
          });

          // ربط sub_id لكل main
          ALL.forEach((q) => {
            if (q.type === "supplementary" && q.parent_id) {
              const mainQ = BY_ID[q.parent_id];
              if (mainQ) mainQ.sub_id = q.id;
            }
          });

          filtered = [...ALL];
          buildTopicList();
          renderChips("diff");
          renderChips("type");
          updateCounts();
          document.getElementById("resultCount").textContent = ALL.length;
          document.getElementById("totalCount").textContent = ALL.length;
          loadMore();
        } catch (e) {
          document.getElementById("questionList").innerHTML =
            '<div class="empty">⚠️ fahrschule_full.json not found.</div>';
        }
      }

      // ── THEME ──
      function getTheme() {
        return localStorage.getItem("theme") || "light";
      }
      function applyTheme(t) {
        document.documentElement.setAttribute("data-theme", t);
        document.getElementById("themeIcon").textContent =
          t === "dark" ? "☀️" : "🌙";
        document.getElementById("themeLabel").textContent =
          t === "dark" ? "Light" : "Dark";
        localStorage.setItem("theme", t);
      }
      function toggleTheme() {
        applyTheme(
          document.documentElement.getAttribute("data-theme") === "dark"
            ? "light"
            : "dark",
        );
      }

      applyTheme(getTheme());
      init();
    </script>
  </body>
</html>
